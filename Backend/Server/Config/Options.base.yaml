# Base options file, included for all platforms

## Database

Database:
  # Master database version: bump version to force the older versions of the database to be reset.
  # Useful during development, but should never be done in production.
  MasterVersion: 1

  # When your game goes live, we recommend disabling (uncommenting) NukeOnVersionMismatch so
  # databases are never accidentally nuked!
  # NukeOnVersionMismatch: false

## WebSockets

# Enable the WebSocket listener (ws://<host>:9380/ws) in all environments so the browser-based
# Blazor WebAssembly WebClient can connect. Disabled by default in the SDK.
WebSockets:
  Enabled: true

## Game config build — Google Sheet source

# Sentinel value: the Footdraft Game Config sheet is LINK-SHARED and fetched credential-less as public
# CSV (see PublicCsvFallbackFetcherProvider). Any non-JSON value here selects that fallback while also
# satisfying the dashboard's "credentials configured" rebuild check. Replace with a real service-account
# key (kube-secret://... or inline JSON) to switch to the authenticated Google Sheets API fetcher.
GoogleSheets:
  CredentialsJson: "public-csv-link-shared-sheet"
